services:
  - type: web
    name: pigops
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: pigops-data
      mountPath: /var/data
      sizeGB: 1
